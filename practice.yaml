- name: declaring the variable
  hosts: localhost
  vars: #variable declaration
    NAME: "vijay"
    from: "India"
    age: "25 years"
  tasks:
  - name: declaring and assigning the value
    ansible.builtin.debug:
      msg: "my  name is {{NAME}} i am {{from}} i age is {{age}}."

- name: variables
  hosts: localhost
  vars: #variable declaration
    name: "vijay"
    Trainer: "Siva"
    Duration: "15hrs"
  tasks:
  - name: print information
    ansible.builtin.debug:
      msg: "Hi, We are learning {{name}} from Trainer {{Trainer}}, Duration is {{Duration}}."